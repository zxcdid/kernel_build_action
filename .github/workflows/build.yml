name: Build Kernel

on:
  workflow_dispatch:

jobs:
  Build-Kernel:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
    permissions:
      contents: read

    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          repository: LineageOS/android_kernel_xiaomi_msm8998
          ref: lineage-22.2
          path: kernel/source

      - name: Disable CC_WERROR in defconfig
        run: |
          sed -i 's/^CONFIG_CC_WERROR=y/# CONFIG_CC_WERROR is not set/' kernel/source/arch/arm64/configs/sagit_defconfig
          grep -n 'CONFIG_CC_WERROR' kernel/source/arch/arm64/configs/sagit_defconfig || true

      - name: Patch AppArmor crypto.c for clang (fix VLA-in-struct)
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          p = Path("kernel/source/security/apparmor/crypto.c")
          s = p.read_text(encoding="utf-8")

          s2 = re.sub(
              r"struct\s*\{\s*struct shash_desc shash;\s*char ctx\[crypto_shash_descsize\(apparmor_tfm\)\];\s*\}\s*desc;",
              "SHASH_DESC_ON_STACK(desc, apparmor_tfm);",
              s,
              count=1,
              flags=re.S
          )

          if s2 == s:
              raise SystemExit("patch failed: target block not found in crypto.c")

          s2 = s2.replace("desc.shash.tfm", "desc->tfm")
          s2 = s2.replace("desc.shash.flags", "desc->flags")
          s2 = s2.replace("&desc.shash", "desc")

          p.write_text(s2, encoding="utf-8")
          print("patched:", p)
          PY

          grep -nE "SHASH_DESC_ON_STACK|desc->tfm|desc->flags|desc\\.shash" kernel/source/security/apparmor/crypto.c || true

      - name: Install coccinelle (for lxc-patch)
        run: |
          sudo apt-get update
          sudo apt-get install -y coccinelle
          spatch --version

      - name: Build Kernel
        uses: zxcdid/kernel_build_action@main
        with:
          kernel-url: ./kernel/source/
          config: sagit_defconfig
          arch: arm64
          aosp-gcc: true
          aosp-clang: true
          ksu: false
          ksu-version: main
          lxc: true
          lxc-patch: true
          android-version: "12"
          aosp-clang-version: r383902
          disable-lto: true
          anykernel3: false
          bootimg-url: https://raw.githubusercontent.com/zxcdid/kernel_build_action/refs/heads/main/boot.img
          extra-make-args: '["WERROR=0","KCFLAGS=-Wno-error=vla","HOSTCFLAGS=-Wno-error=vla"]'
