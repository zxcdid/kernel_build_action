name: Build Kernel
on:
  workflow_dispatch:

jobs:
  Build-Kernel:
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          repository: LineageOS/android_kernel_xiaomi_msm8998
          ref: lineage-22.2
          path: kernel/source

      - name: Disable CC_WERROR in defconfig
        run: |
          sed -i 's/^CONFIG_CC_WERROR=y/# CONFIG_CC_WERROR is not set/' kernel/source/arch/arm64/configs/sagit_defconfig
          grep -n 'CONFIG_CC_WERROR' kernel/source/arch/arm64/configs/sagit_defconfig || true

      - name: Install coccinelle (for lxc-patch)
        run: |
          sudo apt-get update
          sudo apt-get install -y coccinelle
          spatch --version

      - name: Build Kernel
        uses: zxcdid/kernel_build_action@main
        with:
          kernel-url: ./kernel/source/
          config: sagit_defconfig
          arch: arm64
          aosp-gcc: true
          aosp-clang: true
          ksu: false
          ksu-version: main
          lxc: true
          lxc-patch: true
          android-version: "12"
          aosp-clang-version: r383902
          disable-lto: true
          anykernel3: true
          extra-make-args: '["WERROR=0","KCFLAGS=-Wno-error=vla","HOSTCFLAGS=-Wno-error=vla"]'
